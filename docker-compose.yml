services:
  iii-engine:
    image: iiidev/iii:latest
    ports:
      - "127.0.0.1:49134:49134"
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3112:3112"
      - "127.0.0.1:9464:9464"
    volumes:
      - iii-data:/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  iii-data:
